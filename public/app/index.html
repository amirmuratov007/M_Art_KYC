    :root {
      --bg: #050816;
      --panel: #08111f;
      --blue: #38bdf8;
      --gold: #d6a84f;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.14);
      --glass: rgba(8, 17, 31, 0.78);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 85% -10%, rgba(56,189,248,.14), transparent 34%), var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, textarea { font: inherit; }
    .app {
      min-height: 100vh;
      max-width: 520px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(5,8,22,.92), #050816);
      position: relative;
      overflow: hidden;
    }
    .screen { display: none; min-height: 100vh; padding: 22px 18px 98px; }
    .screen.active { display: block; }
    .center {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 28px 22px;
    }
    .brand-line { width: 62px; height: 3px; background: var(--gold); border-radius: 999px; margin-bottom: 18px; }
    .brand-title { margin: 0; font-size: 40px; letter-spacing: 3px; font-weight: 900; }
    .brand-subtitle { margin: 8px 0 0; color: var(--muted); font-size: 13px; letter-spacing: 1.2px; text-transform: uppercase; }
    .splash {
      align-items: center;
      text-align: center;
      overflow: hidden;
    }
    .splash::before {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: rgba(56,189,248,.09);
      top: -210px;
      left: 50%;
      transform: translateX(-50%);
    }
    .shield {
      width: 118px;
      height: 118px;
      border: 3px solid var(--blue);
      border-radius: 34px;
      transform: rotate(45deg);
      display: grid;
      place-items: center;
      margin-bottom: 26px;
      position: relative;
      z-index: 1;
    }
    .eye {
      width: 86px;
      height: 40px;
      border: 3px solid var(--gold);
      border-radius: 999px;
      position: relative;
    }
    .eye::after {
      content: "";
      width: 18px;
      height: 18px;
      background: var(--gold);
      border-radius: 50%;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .splash .brand-title, .splash .brand-subtitle, .splash .brand-line { position: relative; z-index: 1; }
    .language-card, .panel, .card {
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 18px 32px rgba(0,0,0,.28);
      backdrop-filter: blur(18px);
    }
    .language-grid { display: grid; gap: 14px; margin-top: 34px; }
    .language-card {
      width: 100%;
      color: var(--text);
      border-color: rgba(56,189,248,.18);
      padding: 18px;
      display: grid;
      grid-template-columns: 90px 1fr 26px;
      align-items: center;
      gap: 12px;
      text-align: left;
      cursor: pointer;
    }
    .language-card strong { font-size: 20px; }
    .language-card span { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .login-panel { margin-top: 42px; padding: 22px; }
    .change-language {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      border: 1px solid rgba(214,168,79,.22);
      background: rgba(214,168,79,.1);
      color: #f6d88a;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 18px;
      cursor: pointer;
    }
    .login-heading { margin: 0 0 8px; font-size: 24px; font-weight: 900; }
    .copy { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 0; }
    .input {
      width: 100%;
      margin-top: 14px;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid rgba(148,163,184,.16);
      background: rgba(3,8,20,.72);
      color: var(--text);
      outline: none;
    }
    .primary {
      width: 100%;
      border: 0;
      border-radius: 16px;
      background: var(--blue);
      color: var(--bg);
      padding: 16px;
      font-weight: 900;
      margin-top: 18px;
      cursor: pointer;
    }
    .client-only { color: var(--muted); font-size: 12px; text-align: center; text-transform: uppercase; margin-top: 18px; }
    .eyebrow { color: var(--gold); font-size: 12px; font-weight: 900; letter-spacing: 1.4px; text-transform: uppercase; margin-bottom: 8px; }
    .title { margin: 0; font-size: 28px; line-height: 1.2; font-weight: 900; }
    .section-title { font-size: 20px; font-weight: 900; margin: 22px 0 14px; }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 18px; }
    .support-btn { width: 46px; height: 46px; border-radius: 16px; border: 1px solid rgba(214,168,79,.24); background: rgba(214,168,79,.12); color: var(--gold); cursor: pointer; }
    .contract { padding: 18px; display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; border-color: rgba(56,189,248,.16); }
    .label { color: var(--muted); font-size: 12px; font-weight: 900; text-transform: uppercase; }
    .contract-status { margin-top: 5px; font-size: 21px; font-weight: 900; }
    .pill { display: inline-flex; border-radius: 999px; padding: 7px 10px; background: rgba(214,168,79,.16); color: #f6d88a; font-size: 11px; font-weight: 900; text-transform: uppercase; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .metric { padding: 16px; min-height: 132px; }
    .metric-value { margin-top: 12px; font-size: 34px; font-weight: 900; color: var(--blue); }
    .metric.gold .metric-value { color: var(--gold); }
    .helper { color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 8px; }
    .list { padding: 0 16px; }

    .compact-title { font-weight: 900; font-size: 15px; }
    .compact-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .score { color: var(--gold); font-size: 22px; font-weight: 900; }
    .notification { display: flex; gap: 10px; padding: 10px 0; color: #cbd5e1; font-size: 13px; line-height: 1.45; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); margin-top: 6px; flex: 0 0 auto; }
    .card { padding: 16px; margin-bottom: 14px; }

    .card-title { margin: 0; font-size: 18px; line-height: 1.35; font-weight: 900; }
    .card-type { color: var(--muted); font-size: 13px; margin-top: 5px; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .status, .risk, .category { border-radius: 999px; padding: 6px 10px; font-size: 11px; font-weight: 900; text-transform: uppercase; }
    .status { color: #7dd3fc; background: rgba(56,189,248,.14); }
    .risk.medium, .category { color: #f6d88a; background: rgba(214,168,79,.16); }
    .risk.high { color: #fca5a5; background: rgba(248,113,113,.16); }
    .risk.low { color: #86efac; background: rgba(34,197,94,.14); }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.5; margin-top: 14px; }
    .small-btn { border: 0; border-radius: 14px; background: var(--blue); color: var(--bg); font-size: 13px; font-weight: 900; padding: 10px 16px; margin-top: 16px; cursor: pointer; }
    .content-title { margin: 14px 0 0; font-size: 17px; line-height: 1.35; font-weight: 900; }

    .excerpt { color: #cbd5e1; font-size: 13px; line-height: 1.55; margin: 10px 0 0; }

    .tab.active { color: var(--blue); }
    @media (min-width: 740px) {

    }

      { category:"Press", title:{en:"HEIMDALL Expands Enhanced Business Support",ru:"HEIMDALL расширяет направление комплексного сопровождения бизнеса"}, excerpt:{en:"The service combines ongoing risk monitoring, analyst-led reviews, and confidential intelligence reporting for corporate clients.",ru:"Сервис объединяет постоянный риск-мониторинг, аналитические проверки и конфиденциальную разведывательную отчётность для корпоративных клиентов."}, date:{en:"04 May 2026",ru:"04 мая 2026"}, read:{en:"3 min read",ru:"3 минуты"}, tags:[{en:"HEIMDALL",ru:"HEIMDALL"},{en:"Support",ru:"Сопровождение"}] }
    ];
    const l = (value) => typeof value === "string" ? value : value[state.language];
    const t = () => copy[state.language];
    const riskClass = (risk) => risk.toLowerCase();
    const show = (id) => {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      document.getElementById("tabbar").style.display = ["dashboard","checks","reports","signals","site","request","support"].includes(id) ? "grid" : "none";
      state.tab = id;
      renderTabs();
      window.scrollTo(0,0);
    };
    const setLang = (lang) => { state.language = lang; renderLogin(); renderApp(); show("login"); };
    const renderLogin = () => {
      document.getElementById("language-subtitle").textContent = t().choose;
      document.getElementById("brand-subtitle").textContent = t().brand;
      document.querySelector("#change-language span").textContent = t().changeLanguage;
      document.getElementById("login-heading").textContent = t().login;
      document.getElementById("login-copy").textContent = t().loginCopy;
      document.getElementById("sign-in").textContent = t().signIn + " →";
      document.getElementById("client-only").textContent = t().clientOnly;
    };
    const renderTabs = () => {
      const icons = { dashboard:"▦", checks:"♢", reports:"▤", signals:"⌁", site:"☰", request:"＋" };
      document.getElementById("tabbar").innerHTML = Object.keys(t().tabs).map(key => `<button class="tab ${state.tab===key?"active":""}" data-tab="${key}"><span class="icon">${icons[key]}</span><span>${t().tabs[key]}</span></button>`).join("");
      document.querySelectorAll(".tab").forEach(btn => btn.onclick = () => show(btn.dataset.tab));
    };
    const badge = (check) => `<div class="badges"><span class="status">${t().status[check.status]}</span><span class="risk ${riskClass(check.risk)}">${t().risk[check.risk]}</span></div>`;
    const renderDashboard = () => {
      document.getElementById("dashboard").innerHTML = `
        <div class="header-row"><div><div class="eyebrow">HEIMDALL</div><h2 class="title">${client.company}</h2></div><button class="support-btn" onclick="show('support')">▣</button></div>
        <div class="panel contract"><div><div class="label">${t().contractStatus}</div><div class="contract-status">${l(client.status)}</div></div><span class="pill">${l(client.plan)}</span></div>
        <div class="metric-grid">
          ${metric(t().monthlyChecks, client.monthly, "Included in current support cycle")}
          ${metric(t().usedChecks, client.used, "Available balance remains active", "gold")}
          ${metric(t().riskIndex, client.risk + "/100", "Portfolio-level exposure score", "gold")}
          ${metric(t().activeChecks, client.active, client.reports + " " + t().completedReports)}
        </div>
        <h3 class="section-title">${t().priorityChecks}</h3>
        <div class="panel list">${checks.slice(0,3).map(c => `<div class="compact-item" onclick="show('checks')"><div><div class="compact-title">${l(c.subject)}</div><div class="compact-meta">${t().status[c.status]} · ${t().risk[c.risk]}</div></div><div class="score">${c.score}</div></div>`).join("")}</div>
        <h3 class="section-title">${t().latestNotifications}</h3>
        <div class="panel list">${["Analyst review started for Northbridge Supply LLC.","Ownership change signal detected in Orion Trade network.","Candidate Screening Report is ready for review."].map(n => `<div class="notification"><span class="dot"></span><span>${n}</span></div>`).join("")}</div>`;
    };
    const metric = (label, value, helper, cls="") => `<div class="panel metric ${cls}"><div class="label">${label}</div><div class="metric-value">${value}</div><div class="helper">${helper}</div></div>`;
    const renderChecks = () => {
      document.getElementById("checks").innerHTML = `<div class="eyebrow">HEIMDALL</div><h2 class="title">${t().checksTitle}</h2><p class="copy" style="margin-top:8px">${t().checksCopy}</p><h3 class="section-title">${t().checksTitle}</h3>${checks.map(c => `<div class="card"><div class="card-top"><div><h3 class="card-title">${l(c.subject)}</h3><div class="card-type">${l(c.type)}</div></div><div class="score">${c.score}</div></div>${badge(c)}<div class="meta">${t().deadline}: ${l(c.deadline)}<br>${t().analyst}: ${l(c.analyst)}</div><button class="small-btn" onclick="alert('${t().open}')">${t().open}</button></div>`).join("")}`;
    };
    const renderReports = () => {
      document.getElementById("reports").innerHTML = `<div class="eyebrow">HEIMDALL</div><h2 class="title">${t().reportsTitle}</h2><p class="copy" style="margin-top:8px">${t().reportsCopy}</p><h3 class="section-title">${t().reportsTitle}</h3>${reports.map(r => `<div class="card"><div class="card-title">${l(r.title)}</div><div class="meta">${l(r.date)} · ${l(r.type)}</div><div class="bottom-row"><span class="risk ${riskClass(r.risk)}">${t().risk[r.risk]}</span><button class="small-btn" onclick="alert('HEIMDALL API')">${t().openPdf}</button></div></div>`).join("")}`;
    };
    const renderSignals = () => {
      document.getElementById("signals").innerHTML = `<div class="eyebrow">HEIMDALL</div><h2 class="title">${t().signalsTitle}</h2><p class="copy" style="margin-top:8px">${t().signalsCopy}</p><h3 class="section-title">${t().signalsTitle}</h3>${signals.map(s => `<div class="card"><div class="card-top"><h3 class="card-title">${l(s.title)}</h3><span class="risk ${riskClass(s.severity)}">${s.severity}</span></div><div class="card-type" style="color:var(--gold)">${l(s.affected)}</div><p class="excerpt">${l(s.text)}</p><div class="action-box"><div class="label" style="color:#7dd3fc">${t().recommendedAction}</div><p class="excerpt" style="margin-bottom:0">${l(s.action)}</p></div></div>`).join("")}`;
    };
    const contentCard = (item, featured=false) => `<div class="card ${featured?"featured":""}"><div class="card-top"><span class="category">${t().category[item.category]}</span><span class="date">${l(item.date)}</span></div><h3 class="content-title">${l(item.title)}</h3><p class="excerpt">${l(item.excerpt)}</p><div class="tag-row">${item.tags.map(tag => `<span class="tag">${l(tag)}</span>`).join("")}</div><div class="bottom-row"><span class="read-time">${l(item.read)}</span><button class="small-btn" onclick="alert('${t().openOnSite}')">${t().openOnSite}</button></div></div>`;
    const renderSite = () => {
      document.getElementById("site").innerHTML = `<div class="eyebrow">${t().siteEyebrow}</div><h2 class="title">${t().siteTitle}</h2><p class="copy" style="margin-top:8px">${t().siteCopy}</p><h3 class="section-title">${t().featured}</h3>${contentCard(siteContent[0], true)}<h3 class="section-title">${t().latest}</h3>${siteContent.slice(1).map(i => contentCard(i)).join("")}`;
    };
    const renderRequest = () => {
      const types = ["Counterparty Review","Candidate Screening","Beneficial Owner Review","Sanctions Screening","Vendor Review"];
      document.getElementById("request").innerHTML = `<div class="eyebrow">HEIMDALL</div><h2 class="title">${t().requestTitle}</h2><p class="copy" style="margin-top:8px">${t().requestCopy}</p><label class="form-label">${t().checkType}</label><div class="option-grid">${types.map((x,i)=>`<button class="option ${i===state.selectedType?"active":""}" onclick="state.selectedType=${i};renderRequest()">${x}</button>`).join("")}</div><label class="form-label">${t().subject}</label><input class="input" placeholder="${t().subject}"><label class="form-label">${t().jurisdiction}</label><input class="input" placeholder="${t().jurisdiction}"><label class="form-label">${t().comment}</label><textarea class="input textarea"></textarea><button class="small-btn" style="width:100%">${t().attach}</button><button class="primary" onclick="alert('${t().submit}')">${t().submit}</button>`;
    };
    const renderSupport = () => {
      const included = state.language === "ru" ? ["Выделенный аналитик для активных разведывательных запросов","Проверки контрагентов, поставщиков, кандидатов и КБВ","Мониторинг санкционной экспозиции","Ежемесячный риск-бриф","Защищённый архив отчётов"] : ["Dedicated analyst contact for active intelligence requests","Counterparty, vendor, candidate, and UBO checks","Sanctions exposure monitoring","Monthly risk brief","Secure report archive"];
      document.getElementById("support").innerHTML = `<div class="eyebrow">HEIMDALL</div><h2 class="title">${t().supportTitle}</h2><div class="panel metric gold" style="margin-top:18px"><div class="label">${t().from}</div><div class="metric-value">200,000 ₽</div><div class="helper">${t().perMonth}</div></div><h3 class="section-title">${t().included}</h3><div class="panel list">${included.map(i=>`<div class="notification"><span class="dot"></span><span>${i}</span></div>`).join("")}</div><h3 class="section-title">${t().analystContact}</h3><div class="panel card"><div class="card-title">${l(client.analyst)}</div><div class="meta">${client.email}</div><button class="small-btn">${t().contact}</button></div>`;
    };
    const renderApp = () => { renderTabs(); renderDashboard(); renderChecks(); renderReports(); renderSignals(); renderSite(); renderRequest(); renderSupport(); };
    document.querySelectorAll(".language-card").forEach(btn => btn.onclick = () => setLang(btn.dataset.language));
    document.getElementById("change-language").onclick = () => show("language");
    document.getElementById("sign-in").onclick = () => { renderApp(); show("dashboard"); };
    setTimeout(() => show("language"), 1100);
    renderLogin();
  </script>
</body>
</html>
